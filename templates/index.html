<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Al-hadad Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

    <style>
        :root { --gold: #FFB300; --bg-body: #0a0e17; --card-bg: #161b26; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-body); color: #fff; overflow-x: hidden; }

        .fullscreen-overlay { position: fixed; inset: 0; background: radial-gradient(circle at center, #1a1f2c 0%, #0a0e17 100%); z-index: 10000; display: flex; justify-content: center; align-items: center; flex-direction: column;}
        .anim-container { text-align: center; animation: fadeInScale 0.6s ease-out; width: 100%; max-width: 600px; padding: 20px;}
        @keyframes fadeInScale { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        
        .btn-large { border-radius: 15px; border: 3px solid rgba(255,179,0,0.3); background: rgba(255,255,255,0.03); color: var(--gold); font-size: 22px; font-weight: 900; cursor: pointer; transition: 0.3s; margin: 10px; padding: 15px 40px; white-space: nowrap; outline: none; min-width: 200px;}
        .btn-large:hover, .btn-large:active { transform: scale(1.05); background: var(--gold); color: #000; border-color: #fff; box-shadow: 0 0 30px rgba(255,179,0,0.6); }

        #main-app { display: none; }
        .navbar { background: rgba(10, 14, 23, 0.95); backdrop-filter: blur(10px); height: 60px; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(255,179,0,0.3); gap:5px;}
        .logo { font-size: 20px; font-weight: 900; color: var(--gold); white-space: nowrap;}
        .hero { padding: 40px 15px; text-align: center; }
        
        .container { padding: 10px 20px 50px; max-width: 1200px; margin: auto; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 25px; }
        .product-card { background: var(--card-bg); border-radius: 20px; padding: 30px; text-align: center; border: 1px solid rgba(255,255,255,0.05); transition: 0.3s; }
        .product-card:hover { transform: translateY(-10px); border-color: var(--gold); box-shadow: 0 10px 30px rgba(255,179,0,0.1); }
        .product-image { width: 100%; max-width: 200px; margin: 0 auto 20px; display: block; filter: drop-shadow(0 10px 20px rgba(255,179,0,0.3)); }
        
        .buy-btn { background: linear-gradient(90deg, #FFB300, #FFD54F); color: #000; border: none; width: 100%; padding: 15px; border-radius: 15px; font-size: 19px; font-weight: 900; display: flex; align-items: center; justify-content: center; gap: 10px; cursor: pointer; transition: 0.3s; outline:none;}
        .buy-btn:hover { filter: brightness(1.1); box-shadow: 0 0 20px rgba(255,179,0,0.4); }

        .swal2-popup { border-radius: 25px !important; background: #1a1f2c !important; color: #fff !important; }
        .vf-box { background: #0d1117; padding: 20px; border-radius: 15px; border: 1px dashed var(--gold); margin-bottom: 20px; }
        .input-dark { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #4a5568; background: #0d1117; color: #fff; text-align: center; font-size: 16px; outline: none; margin-top: 10px; }
        .input-dark:focus { border-color: var(--gold); }

        .nav-btn { background:rgba(6,182,212,0.1); border:1px solid var(--cyan); color:var(--cyan); padding:5px 10px; border-radius:15px; font-weight:bold; cursor:pointer; font-size:12px; white-space:nowrap;}
    </style>
</head>
<body>

    <div id="lang-screen" class="fullscreen-overlay" style="display:none;">
        <div class="anim-container">
            <i class="fas fa-crown fa-4x" style="color:var(--gold); margin-bottom:20px; filter: drop-shadow(0 0 20px rgba(255,179,0,0.5));"></i>
            <h1 style="font-weight:900; margin-bottom:40px; letter-spacing:2px;">AL-HADAD STORE</h1>
            <div style="display:flex; flex-direction:column; align-items:center; gap:10px;">
                <button class="btn-large" onclick="selectLang('ar')">عربي</button>
                <button class="btn-large" onclick="selectLang('en')">English</button>
            </div>
        </div>
    </div>

    <div id="device-screen" class="fullscreen-overlay" style="display:none; z-index:9999;">
        <div class="anim-container">
            <i class="fas fa-mobile-alt fa-4x" style="color:var(--cyan); margin-bottom:20px; filter: drop-shadow(0 0 20px rgba(6,182,212,0.5));"></i>
            <h1 id="dev-title" style="font-weight:900; margin-bottom:40px; font-size:28px;">اختر نظام التشغيل</h1>
            <div style="display:flex; flex-direction:column; align-items:center; gap:10px;">
                <button class="btn-large" onclick="selectDevice('android')"><i class="fab fa-android"></i> أندرويد / Android</button>
                <button class="btn-large" onclick="selectDevice('iphone')"><i class="fab fa-apple"></i> آيفون / iPhone</button>
            </div>
            <button onclick="goBack('lang')" style="background:none; border:none; color:var(--text-muted); margin-top:30px; text-decoration:underline; font-family:'Cairo'; cursor:pointer; font-size:16px;">رجوع / Back</button>
        </div>
    </div>

    <div id="category-screen" class="fullscreen-overlay" style="display:none; z-index:9998;">
        <div class="anim-container">
            <i class="fas fa-layer-group fa-4x" style="color:var(--gold); margin-bottom:20px; filter: drop-shadow(0 0 20px rgba(255,179,0,0.5));"></i>
            <h1 id="cat-title" style="font-weight:900; margin-bottom:40px; font-size:28px;">اختر القسم</h1>
            <div id="cat-buttons" style="display:flex; flex-wrap:wrap; justify-content:center; gap:15px;">
                </div>
            <button onclick="goBack('device')" style="background:none; border:none; color:var(--text-muted); margin-top:30px; text-decoration:underline; font-family:'Cairo'; cursor:pointer; font-size:16px;">رجوع / Back</button>
        </div>
    </div>

    <div id="main-app">
        <nav class="navbar">
            <div class="logo">Al-hadad</div>
            <div style="display:flex; gap:5px; flex-wrap:wrap; justify-content:flex-end;">
                <button class="nav-btn" onclick="showCategoryScreen()"><i class="fas fa-layer-group"></i> <span id="current-cat-text">القسم</span></button>
                <button class="nav-btn" onclick="showDeviceScreen()" style="border-color:var(--success); color:var(--success); background:rgba(16,185,129,0.1);"><i class="fas fa-mobile-alt"></i> <span id="current-dev-text">نظام</span></button>
                <button class="nav-btn" onclick="toggleLang()" style="border-color:var(--gold); color:var(--gold); background:rgba(255,179,0,0.1);"><i class="fas fa-globe"></i> <span id="lang-btn-text">EN</span></button>
            </div>
        </nav>

        <header class="hero">
            <h1 id="hero-title" style="font-size:32px; font-weight:900;">اشحن شداتك الآن</h1>
            <p id="hero-sub" style="color:var(--gold); margin-top:10px; font-size:18px;">سرعة، أمان، وتسليم فوري</p>
        </header>

        <div class="container">
            <div class="products-grid" id="products-list"></div>
        </div>
    </div>

    <script>
        let lang = 'ar';
        let selectedDevice = null;
        let selectedCategoryId = null;
        let globalCategories = [];
        let allProducts = [];
        const VF_NUM = "01012345678"; 

        const trans = {
            ar: { dir: "rtl", title: "اشحن شداتك الآن", sub: "سرعة، أمان، وتسليم فوري", buy: "شراء الآن", payT: "طلب باقة", hint: "ارفع الإيصال ورقم الـ ID", ok: "تأكيد الطلب", success: "تم استلام طلبك بنجاح!", chooseDev: "اختر نظام التشغيل", chooseCat: "اختر القسم المطلوب" },
            en: { dir: "ltr", title: "Top Up UC Now", sub: "Fast, Secure, and Instant Delivery", buy: "Buy Now", payT: "Order Package", hint: "Upload receipt & Player ID", ok: "Confirm Order", success: "Order received successfully!", chooseDev: "Select OS", chooseCat: "Select Category" }
        };

        window.onload = async () => {
            AOS.init();
            const res = await fetch('/api/data');
            const data = await res.json();
            globalCategories = data.categories || [];
            allProducts = data.products || [];

            const savedLang = localStorage.getItem('site_lang');
            const savedDev = localStorage.getItem('site_dev');
            const savedCat = localStorage.getItem('site_cat');
            
            if(savedLang) {
                lang = savedLang; applyLangStyle();
                if(savedDev) {
                    selectedDevice = savedDev;
                    if (savedCat && globalCategories.find(c => c.id === savedCat && c.parent === savedDev)) {
                        selectedCategoryId = savedCat;
                        showMainApp();
                    } else {
                        showCategoryScreen();
                    }
                } else {
                    showDeviceScreen();
                }
            } else {
                document.getElementById('lang-screen').style.display = 'flex';
            }
        };

        function applyLangStyle() {
            document.documentElement.dir = trans[lang].dir;
            document.getElementById('lang-btn-text').innerText = (lang === 'ar') ? 'English' : 'عربي';
        }

        function selectLang(l) { lang = l; localStorage.setItem('site_lang', l); applyLangStyle(); showDeviceScreen(); }
        function selectDevice(d) { selectedDevice = d; localStorage.setItem('site_dev', d); showCategoryScreen(); }
        function selectCategory(id) { selectedCategoryId = id; localStorage.setItem('site_cat', id); showMainApp(); }

        function goBack(to) {
            document.querySelectorAll('.fullscreen-overlay').forEach(e => e.style.display = 'none');
            if(to === 'lang') document.getElementById('lang-screen').style.display = 'flex';
            if(to === 'device') document.getElementById('device-screen').style.display = 'flex';
        }

        function showDeviceScreen() {
            document.querySelectorAll('.fullscreen-overlay').forEach(e => e.style.display = 'none');
            document.getElementById('main-app').style.display = 'none';
            document.getElementById('dev-title').innerText = trans[lang].chooseDev;
            document.getElementById('device-screen').style.display = 'flex';
        }

        function showCategoryScreen() {
            document.querySelectorAll('.fullscreen-overlay').forEach(e => e.style.display = 'none');
            document.getElementById('main-app').style.display = 'none';
            document.getElementById('cat-title').innerText = trans[lang].chooseCat;
            
            const cats = globalCategories.filter(c => c.parent === selectedDevice);
            document.getElementById('cat-buttons').innerHTML = cats.length ? cats.map(c => `
                <button class="btn-large" onclick="selectCategory('${c.id}')"><i class="fas fa-arrow-circle-left" style="margin:0 5px; font-size:16px; color:var(--text-muted);"></i> ${c.name}</button>
            `).join('') : `<p style="color:var(--text-muted); font-size:18px;">لا توجد أقسام في هذا النظام حالياً</p>`;
            
            document.getElementById('category-screen').style.display = 'flex';
        }

        function showMainApp() {
            document.querySelectorAll('.fullscreen-overlay').forEach(e => e.style.display = 'none');
            document.getElementById('main-app').style.display = 'block';
            
            const t = trans[lang];
            document.getElementById('hero-title').innerText = t.title;
            document.getElementById('hero-sub').innerText = t.sub;
            
            const catName = globalCategories.find(c => c.id === selectedCategoryId)?.name || '';
            document.getElementById('current-dev-text').innerText = selectedDevice === 'android' ? 'Android' : 'iPhone';
            document.getElementById('current-cat-text').innerText = catName.split(' / ')[lang === 'en' ? 1 : 0] || catName; 
            
            renderProducts();
        }

        function renderProducts() {
            const products = allProducts.filter(p => p.categoryId === selectedCategoryId);
            document.getElementById('products-list').innerHTML = products.length ? products.map((p, i) => `
                <div class="product-card" data-aos="fade-up" data-aos-delay="${(i%10)*100}">
                    <img src="${p.image}" class="product-image">
                    <h2 style="font-size:24px; font-weight:900; margin-bottom:10px;">${p.name}</h2>
                    <h3 style="color:var(--gold); font-size:20px; margin-bottom:20px;">${p.price} EGP</h3>
                    <button class="buy-btn" onclick="openPay('${p.name}', '${p.price}')"><i class="fas fa-bolt"></i> ${trans[lang].buy}</button>
                </div>
            `).join('') : `<div style="text-align:center; grid-column:1/-1; color:var(--text-muted); padding:50px;"><i class="fas fa-box-open fa-3x"></i><br><br>لا توجد باقات متوفرة في هذا القسم حالياً</div>`;
        }

        function toggleLang() {
            lang = (lang === 'ar') ? 'en' : 'ar'; localStorage.setItem('site_lang', lang); applyLangStyle();
            if(document.getElementById('main-app').style.display === 'block') showMainApp();
            else if (document.getElementById('category-screen').style.display === 'flex') showCategoryScreen();
            else if (document.getElementById('device-screen').style.display === 'flex') showDeviceScreen();
        }

        async function openPay(name, price) {
            const t = trans[lang];
            const oId = "ALH-" + Math.floor(100000 + Math.random() * 900000);
            const catObj = globalCategories.find(c => c.id === selectedCategoryId);
            const devName = selectedDevice === 'android' ? 'أندرويد' : 'آيفون';
            const catFull = `${devName} - ${catObj ? catObj.name : ''}`;

            const { value: form } = await Swal.fire({
                title: `<span style="color:var(--gold)">${t.payT} ${name}</span>`,
                html: `
                    <div class="vf-box"><span style="font-size:14px; color:#9CA3AF">Vodafone Cash</span><h2 style="color:#fff; font-weight:900; letter-spacing:2px; margin:10px 0;">${VF_NUM}</h2></div>
                    <input id="pid" class="input-dark" placeholder="Player ID">
                    <div style="margin-top:20px; padding:20px; border:2px dashed #4a5568; border-radius:15px; cursor:pointer;" onclick="document.getElementById('pfile').click()"><i class="fas fa-cloud-upload-alt fa-2x" style="color:var(--gold)"></i><p style="margin-top:10px; color:#9CA3AF; font-size:14px;">${t.hint}</p></div>
                    <input type="file" id="pfile" hidden accept="image/*">
                `,
                confirmButtonColor: '#FFB300', confirmButtonText: `<span style="color:#000; font-weight:bold">${t.ok}</span>`,
                preConfirm: () => {
                    const id = document.getElementById('pid').value, f = document.getElementById('pfile').files[0];
                    if(!id || !f) return Swal.showValidationMessage('يرجى اكمال البيانات!');
                    return new Promise(r => { const rd = new FileReader(); rd.onload = (e) => r({ id, img: e.target.result }); rd.readAsDataURL(f); });
                }
            });

            if(form) {
                Swal.fire({ title: '...', didOpen: () => Swal.showLoading() });
                await fetch('/api/action', {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ action: 'new_order', order: { orderId: oId, productName: name, amount: price, pubgId: form.id, receiptImage: form.img, deviceCategory: catFull } })
                });
                Swal.fire({ icon: 'success', title: t.success, html: `<p style="color:#9CA3AF; margin-bottom:10px;">Transaction ID</p><h3 style="color:var(--gold); font-family:monospace; background:#000; padding:10px; border-radius:10px; border:1px solid #333;">${oId}</h3>`, confirmButtonColor: '#10B981', background: '#1a1f2c', color: '#fff' });
            }
        }
    </script>
</body>
</html>
